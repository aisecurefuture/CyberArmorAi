openapi: 3.1.0

info:
  title: CyberArmor AI Identity Control Plane API
  version: 2.0.0
  description: |
    ## CyberArmor / CyberArmor — AI Identity Control Plane

    Zero-trust security fabric for AI agents and LLM workloads.
    Covers three microservices:

    | Service           | Default Port | Purpose                                      |
    |-------------------|:------------:|----------------------------------------------|
    | Agent Identity    | 8008         | Agent registration, JWT tokens, delegations  |
    | AI Router         | 8009         | Unified LLM proxy, credential vault          |
    | Audit Graph       | 8011         | Immutable audit events, causal action graphs |

    ### Authentication
    All endpoints require **either**:
    - `Authorization: Bearer <jwt>` — JWT issued by the Agent Identity service
    - `X-API-Key: <secret>` — Agent shared secret / API key

    Multi-tenant: every request scoped to a `tenant_id`.

    ### Post-Quantum Cryptography
    Tokens are signed with ML-DSA-87 (Dilithium). Key exchange uses ML-KEM-1024 (Kyber).

  contact:
    name: CyberArmor Engineering
    url: https://cyberarmor.ai
    email: api@cyberarmor.ai

  license:
    name: Proprietary
    url: https://cyberarmor.ai/license

servers:
  - url: http://localhost:8008
    description: Agent Identity Service (local dev)
  - url: http://localhost:8009
    description: AI Router Service (local dev)
  - url: http://localhost:8011
    description: Audit Graph Service (local dev)
  - url: https://api.cyberarmor.ai
    description: Production (all services via unified gateway)

# ============================================================================
# Security schemes
# ============================================================================
security:
  - BearerAuth: []
  - ApiKeyAuth: []

# ============================================================================
# Tags
# ============================================================================
tags:
  - name: agents
    description: AI agent identity lifecycle — registration, lookup, update, revocation
  - name: tokens
    description: JWT token issuance, validation and revocation for AI agents
  - name: workloads
    description: SPIFFE/SVID workload attestation for zero-trust identity
  - name: delegations
    description: Agent-to-agent permission delegation chains
  - name: ai-routing
    description: Unified LLM proxy — send completions to any provider via one endpoint
  - name: credentials
    description: Encrypted provider credential vault management
  - name: policy
    description: Policy CRUD and evaluation
  - name: events
    description: Audit event ingestion and query
  - name: graph
    description: Causal action graphs — who called what, when, and why
  - name: risk
    description: Risk scoring, timeline, integrity verification
  - name: control-plane
    description: Tenant/admin operations, API keys, telemetry, and incident viewer APIs
  - name: identity
    description: Identity provider enrichment and token validation
  - name: runtime
    description: Runtime decision orchestration endpoint
  - name: detection
    description: Content risk and safety scanning
  - name: compliance
    description: Compliance framework assessment and evidence APIs
  - name: siem
    description: SIEM output configuration and connector APIs
  - name: health
    description: Service health and readiness probes

# ============================================================================
# Paths — Agent Identity Service (port 8008)
# ============================================================================
paths:

  # --------------------------------------------------------------------------
  # Agent registration
  # --------------------------------------------------------------------------
  /agents/register:
    post:
      tags: [agents]
      operationId: registerAgent
      summary: Register a new AI agent
      description: |
        Creates a new AI agent identity within a tenant.
        Returns an `agent_id` and initial configuration.
        The caller must store the returned `agent_secret` securely — it is
        shown only once.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRegistrationRequest'
            examples:
              standard_agent:
                summary: Register a standard inference agent
                value:
                  tenant_id: tenant-acme
                  name: product-recommendation-bot
                  description: Recommends products based on user queries
                  trust_level: standard
                  capabilities:
                    - ai:inference
                    - ai:embed
                  max_requests_per_minute: 120
      responses:
        '201':
          description: Agent successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRegistrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Agent with this name already exists in the tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /agents:
    get:
      tags: [agents]
      operationId: listAgents
      summary: List agents for a tenant
      parameters:
        - in: query
          name: tenant_id
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: environment
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Matching agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /agents/{agent_id}:
    parameters:
      - $ref: '#/components/parameters/AgentIdPath'

    get:
      tags: [agents]
      operationId: getAgent
      summary: Get agent details
      description: Returns the full agent record for the given `agent_id`.
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags: [agents]
      operationId: updateAgent
      summary: Update agent metadata or configuration
      description: |
        Updates mutable fields of an agent. Only fields present in the
        request body are modified (partial update / PATCH semantics).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdateRequest'
      responses:
        '200':
          description: Updated agent record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [agents]
      operationId: revokeAgent
      summary: Revoke (soft-delete) an agent
      description: |
        Sets the agent status to `revoked`. All tokens issued to this agent
        are immediately invalidated. The audit record is preserved.
      responses:
        '200':
          description: Agent revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # --------------------------------------------------------------------------
  # Token management
  # --------------------------------------------------------------------------
  /agents/{agent_id}/tokens/issue:
    parameters:
      - $ref: '#/components/parameters/AgentIdPath'
    post:
      tags: [tokens]
      operationId: issueToken
      summary: Issue a JWT access token for an agent
      description: |
        Issues a short-lived JWT signed with ML-DSA-87 (Dilithium).
        The token encodes the agent's scopes, tenant, and expiry.
        Use this token as `Authorization: Bearer <token>` on subsequent requests.
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /agents/{agent_id}/rotate:
    parameters:
      - $ref: '#/components/parameters/AgentIdPath'
    post:
      tags: [tokens]
      operationId: rotateAgentCredentials
      summary: Rotate agent credentials and issue a new token
      responses:
        '200':
          description: Rotated token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /agents/{agent_id}/lineage:
    parameters:
      - $ref: '#/components/parameters/AgentIdPath'
    get:
      tags: [agents, delegations]
      operationId: getAgentLineage
      summary: Return active delegation lineage for an agent
      responses:
        '200':
          description: Agent lineage and active chains
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id:
                    type: string
                  display_name:
                    type: string
                  chain:
                    type: array
                    items:
                      type: object
                      properties:
                        chain_id:
                          type: string
                        parent_human_id:
                          type: string
                        scope:
                          type: array
                          items:
                            type: string
                        expires_at:
                          type: string
                          format: date-time
                          nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /agents/{agent_id}/tokens/validate:
    parameters:
      - $ref: '#/components/parameters/AgentIdPath'
    post:
      tags: [tokens]
      operationId: validateToken
      summary: Validate a JWT token
      description: |
        Validates the signature, expiry, and revocation status of a JWT.
        Returns decoded claims on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: The JWT string to validate
                required_scopes:
                  type: array
                  items:
                    type: string
                  description: Optional list of scopes that must be present
      responses:
        '200':
          description: Token validation result (valid or invalid)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenValidationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /agents/{agent_id}/tokens/revoke:
    parameters:
      - $ref: '#/components/parameters/AgentIdPath'
    post:
      tags: [tokens]
      operationId: revokeToken
      summary: Revoke a specific token or all tokens for an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token_id
              properties:
                token_id:
                  type: string
                  description: Token ID to revoke.
      responses:
        '200':
          description: Token(s) revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # --------------------------------------------------------------------------
  # Workload attestation (SPIFFE)
  # --------------------------------------------------------------------------
  /workloads/attest:
    post:
      tags: [workloads]
      operationId: attestWorkload
      summary: SPIFFE workload attestation
      description: |
        Attests a workload identity using SPIFFE/SVID selectors.
        On success, issues a short-lived SVID and maps the workload to an
        existing `agent_id`. Supports node, pod, and process selectors.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkloadAttestationRequest'
      responses:
        '200':
          description: Workload attested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkloadAttestationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Workload attestation failed — selectors did not match any agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /workloads/{workload_id}:
    get:
      tags: [workloads]
      operationId: getWorkload
      summary: Get workload attestation status by workload ID
      parameters:
        - in: path
          name: workload_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workload record
          content:
            application/json:
              schema:
                type: object
                properties:
                  workload_id:
                    type: string
                  status:
                    type: string
                  svid:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # --------------------------------------------------------------------------
  # Delegation chains
  # --------------------------------------------------------------------------
  /delegations:
    post:
      tags: [delegations]
      operationId: createDelegation
      summary: Create an agent-to-agent delegation chain
      description: |
        Allows `delegator_id` to grant a subset of its scopes to `delegate_id`
        for a bounded time period. The chain depth is capped by `max_depth`
        to prevent unbounded permission propagation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelegationCreateRequest'
            examples:
              simple_delegation:
                summary: Delegate inference scope for 24 hours
                value:
                  parent_human_id: user-123
                  agent_id: agt-worker-002
                  scope:
                    - ai:inference
                  expires_at: "2026-12-31T23:59:59Z"
      responses:
        '201':
          description: Delegation chain created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelegationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Delegator does not hold the requested scopes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags: [delegations]
      operationId: listDelegations
      summary: List delegation chains
      parameters:
        - name: parent_human_id
          in: query
          schema:
            type: string
          description: Filter by parent human identifier
        - name: agent_id
          in: query
          schema:
            type: string
          description: Filter by agent identifier
        - name: status
          in: query
          schema:
            type: string
          description: Filter by delegation status
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: List of delegation chains
          content:
            application/json:
              schema:
                type: object
                properties:
                  delegations:
                    type: array
                    items:
                      $ref: '#/components/schemas/DelegationResponse'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /delegations/{chain_id}:
    parameters:
      - name: chain_id
        in: path
        required: true
        schema:
          type: string
        description: Delegation chain ID

    delete:
      tags: [delegations]
      operationId: revokeDelegation
      summary: Revoke a delegation chain
      description: |
        Immediately revokes the delegation chain. Any tokens obtained using
        this delegation are invalidated within the next token-check cycle.
      responses:
        '200':
          description: Delegation chain revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # --------------------------------------------------------------------------
  # Health / readiness / metrics (Agent Identity Service)
  # --------------------------------------------------------------------------
  /health:
    get:
      tags: [health]
      operationId: healthCheck
      summary: Health check
      description: Returns service health. No authentication required.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags: [health]
      operationId: readinessCheck
      summary: Readiness check (Kubernetes probe)
      description: |
        Returns 200 only when the service has completed startup and all
        backing stores (database, Redis) are reachable.
      security: []
      responses:
        '200':
          description: Service is ready to accept traffic
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'

  /metrics:
    get:
      tags: [health]
      operationId: getMetrics
      summary: Prometheus metrics
      description: Exposes Prometheus-format metrics for scraping.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Prometheus metrics text
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================================
  # Paths — AI Router Service (port 8009)
  # ============================================================================

  /ai/chat/completions:
    post:
      tags: [ai-routing]
      operationId: chatCompletions
      summary: Unified AI chat completions
      description: |
        Single endpoint for chat completions across all configured LLM providers.
        The router handles:
        1. Policy evaluation (pre-call)
        2. Provider selection and credential injection
        3. Request forwarding to the upstream provider
        4. Response validation and PII scrubbing
        5. Audit event emission (post-call)
        6. Cost tracking and budget enforcement

        Set `provider` to target a specific provider, or omit for automatic
        selection based on model name, cost, and availability.

        Streaming is supported via `stream: true` (Server-Sent Events).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
            examples:
              openai_gpt4o:
                summary: GPT-4o via OpenAI
                value:
                  tenant_id: tenant-acme
                  provider: openai
                  model: gpt-4o
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Summarise the quarterly report.
                  max_tokens: 1024
                  temperature: 0.7
              auto_route:
                summary: Auto-select cheapest capable model
                value:
                  tenant_id: tenant-acme
                  model: auto
                  messages:
                    - role: user
                      content: What is the capital of France?
                  metadata:
                    agent_id: agt-worker-002
                    trace_id: trace-abc123
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: SSE stream of partial completion chunks
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Policy denied the request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDeniedResponse'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          description: Rate limit or budget exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /ai/completions:
    post:
      tags: [ai-routing]
      operationId: legacyCompletions
      summary: Legacy non-chat completions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionRequest'
      responses:
        '200':
          description: Completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '424':
          description: No credentials configured for selected provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /ai/embeddings:
    post:
      tags: [ai-routing]
      operationId: createEmbeddings
      summary: Generate text embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbeddingsRequest'
      responses:
        '200':
          description: Embeddings response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '424':
          description: No credentials configured for selected provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /ai/images/generate:
    post:
      tags: [ai-routing]
      operationId: generateImage
      summary: Generate images
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImagesGenerateRequest'
      responses:
        '200':
          description: Image generation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagesGenerateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '424':
          description: No credentials configured for selected provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Provider does not support image generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /ai/messages:
    post:
      tags: [ai-routing]
      operationId: anthropicMessages
      summary: Anthropic-style message endpoint
      description: Accepts Anthropic-style envelope and returns a normalized chat completion response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Normalized chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /ai/models:
    get:
      tags: [ai-routing]
      operationId: listModels
      summary: List all available models across all providers
      parameters:
        - name: provider
          in: query
          schema:
            type: string
          description: Filter by provider name
        - name: capability
          in: query
          schema:
            type: string
            enum: [chat, embed, image, audio, vision, code]
          description: Filter by model capability
      responses:
