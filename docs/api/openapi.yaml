  # --------------------------------------------------------------------------
  # Credential vault (AI Router)
  # --------------------------------------------------------------------------
  /credentials/providers/{provider}/configure:
    post:
      parameters:
        - $ref: '#/components/parameters/ProviderPath'
        - name: tenant_id
          in: query
          schema:
            type: string
            default: default
          description: Tenant scope for credential storage
      tags: [credentials]
      operationId: configureProviderCredential
      summary: Store encrypted provider API credentials
      description: |
        Encrypts and stores an API key for the specified provider using
        ML-KEM-1024 (Kyber) key encapsulation. The plaintext key is never
        persisted and is not returned after this call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialConfigureRequest'
      responses:
        '200':
          description: Credential stored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialConfigureResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /credentials/providers/{provider}/status:
    get:
      parameters:
        - $ref: '#/components/parameters/ProviderPath'
        - name: tenant_id
          in: query
          schema:
            type: string
            default: default
          description: Tenant scope for lookup (or fallback to default tenant)
      tags: [credentials]
      operationId: providerCredentialStatus
      summary: Get provider credential configuration status
      responses:
        '200':
          description: Provider configuration status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /credentials/providers/{provider}/rotate:
    post:
      tags: [credentials]
      operationId: rotateProviderCredential
      summary: Rotate a provider API key
      description: |
        Atomically replaces the stored API key with a new one.
        In-flight requests complete using the old key before it is discarded.
      parameters:
        - $ref: '#/components/parameters/ProviderPath'
        - name: tenant_id
          in: query
          schema:
            type: string
            default: default
          description: Tenant scope for credential update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialConfigureRequest'
      responses:
        '200':
          description: API key rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialRotateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
