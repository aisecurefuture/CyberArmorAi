  # ============================================================================
  # Paths — Audit Graph Service (port 8011)
  # ============================================================================

  /events:
    post:
      tags: [events]
      operationId: emitEvent
      summary: Emit a single audit event
      description: |
        Emits one audit event to the immutable audit log.
        The service computes and stores an HMAC-SHA256 signature over the
        event payload for tamper-detection.
        `event_id` is auto-generated (UUIDv4) if not provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditEventIngest'
      responses:
        '201':
          description: Event stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventIngestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags: [events]
      operationId: queryEvents
      summary: Query audit events
      description: |
        Returns audit events matching the supplied filters.
        Results are ordered by `timestamp` descending.
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
          description: Filter by agent ID
        - name: tenant_id
          in: query
          schema:
            type: string
          description: Filter by tenant ID
        - name: provider
          in: query
          schema:
            type: string
          description: Filter by provider
        - name: event_type
          in: query
          schema:
            type: string
          description: Filter by event type
        - name: outcome
          in: query
          schema:
            type: string
          description: Filter by outcome
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Start timestamp (inclusive)
        - name: until
          in: query
          schema:
            type: string
            format: date-time
          description: End timestamp (inclusive)
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: List of matching audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventsQueryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /events/{event_id}:
    get:
      tags: [events]
      operationId: getEvent
      summary: Get a single audit event by ID
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /events/batch:
    post:
      tags: [events]
      operationId: emitEventBatch
      summary: Batch emit audit events
      description: |
        Emits up to 1000 audit events in a single request.
        Each event is processed independently. Partial failures are reported
        in the response; successfully stored events are not retried.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditBatchIngestRequest'
      responses:
        '202':
          description: Batch stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditBatchIngestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalError'

  /traces/{trace_id}:
    parameters:
      - name: trace_id
        in: path
        required: true
        schema:
          type: string
        description: Distributed trace ID
    get:
      tags: [events]
      operationId: getTrace
      summary: Get all events belonging to a trace
      description: |
        Returns all audit events that share the given `trace_id`, ordered
        by `timestamp` ascending to reconstruct the request flow.
      responses:
        '200':
          description: Events for this trace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditTraceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # --------------------------------------------------------------------------
  # Action graphs
  # --------------------------------------------------------------------------
  /graph/agent/{agent_id}:
    parameters:
      - $ref: '#/components/parameters/AgentIdPath'
    get:
      tags: [graph]
      operationId: getAgentGraph
      summary: Get causal action graph for an agent
      description: |
        Returns a directed acyclic graph (DAG) of all actions performed by
        `agent_id`, including edges representing causal relationships
        (which action spawned which downstream call).
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 720
          description: Time window in hours
      responses:
        '200':
          description: Action graph for the agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditActionGraphResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /graph/human/{human_id}:
    parameters:
      - name: human_id
        in: path
        required: true
        schema:
          type: string
        description: Human user identifier (SSO subject / email)
    get:
      tags: [graph]
      operationId: getHumanGraph
      summary: Get action graph for a human user
      description: |
        Returns all AI actions attributable to the given human user across
        all agents they have spawned or controlled.
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 720
      responses:
        '200':
          description: Action graph for the human user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditActionGraphResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # --------------------------------------------------------------------------
  # Timeline and export
  # --------------------------------------------------------------------------
  /timeline:
    get:
      tags: [risk]
      operationId: getTimeline
      summary: Get event timeline with risk aggregation
      description: |
        Returns time-bucketed event counts and risk scores for dashboard
        visualisation. Useful for spotting anomalous activity spikes.
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            default: 24
            minimum: 1
            maximum: 720
          description: Time window in hours
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: Timeline data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditTimelineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /export:
    post:
      tags: [events]
      operationId: exportEvents
      summary: Export audit events as CSV or JSON
      description: |
        Returns an export job descriptor for filtered events.
      parameters:
        - name: fmt
          in: query
          schema:
            type: string
            default: json
          description: Export format hint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: Export job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditExportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # --------------------------------------------------------------------------
  # Integrity verification
  # --------------------------------------------------------------------------
  /integrity/verify/{event_id}:
    parameters:
      - name: event_id
        in: path
        required: true
        schema:
          type: string
        description: Audit event ID to verify
    get:
      tags: [risk]
      operationId: verifyEventIntegrity
      summary: Verify HMAC-SHA256 signature of an audit event
      description: |
        Recomputes the HMAC-SHA256 over the stored event fields and compares
        against the stored `hmac_signature`. Use this to prove the event has
        not been tampered with since initial ingestion.
      responses:
        '200':
          description: Integrity check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditIntegrityVerificationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

# ============================================================================
# Components
# ============================================================================
components:

  # --------------------------------------------------------------------------
  # Security schemes
  # --------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by the Agent Identity service (/agents/{id}/tokens/issue)
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Agent shared secret configured at registration time

  # --------------------------------------------------------------------------
  # Reusable parameters
  # --------------------------------------------------------------------------
  parameters:
    AgentIdPath:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
      description: "Unique agent identifier (format: agt-<uuid>)"

    ProviderPath:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [openai, anthropic, google, microsoft, amazon, xai, meta, perplexity]
      description: AI provider name

    TenantIdQuery:
      name: tenant_id
      in: query
      schema:
        type: string
      description: Tenant identifier (required for multi-tenant deployments)

    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 1000
      description: Maximum number of results to return

    OffsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Pagination offset

  # --------------------------------------------------------------------------
  # Reusable responses
  # --------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Bad request — validation error in the request body or params
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Missing or invalid authentication credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: unauthorized
            message: Missing or invalid Bearer token or X-API-Key header
            status: 401

    Forbidden:
      description: Authenticated but not authorised to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    UnprocessableEntity:
      description: Request body is well-formed but semantically invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # --------------------------------------------------------------------------
  # Schemas
  # --------------------------------------------------------------------------
  schemas:

    # ---- Agent ---------------------------------------------------------------

    AgentRegistrationRequest:
      type: object
      required: [tenant_id, name]
      properties:
        tenant_id:
          type: string
          description: Tenant that owns this agent
          example: tenant-acme
        name:
          type: string
          description: Human-readable agent name (unique within tenant)
          minLength: 1
          maxLength: 128
          example: product-recommendation-bot
        description:
          type: string
          maxLength: 1024
          description: Optional description of the agent's purpose
        trust_level:
          type: string
          enum: [restricted, standard, privileged]
          default: standard
          description: |
            Trust tier:
            - `restricted` — minimal scopes, requires MFA for sensitive ops
            - `standard`   — default for most service agents
            - `privileged` — can access sensitive data and perform admin ops
        capabilities:
          type: array
          items:
            type: string
          description: Declared capability tags (e.g. ai:inference, ai:embed)
          example: [ai:inference, ai:audit]
        max_requests_per_minute:
          type: integer
          default: 60
          minimum: 1
          maximum: 10000
          description: Per-agent rate limit (requests per minute)
        allowed_models:
          type: array
          items:
            type: string
          description: Allowlist of model IDs this agent may access (empty = all allowed)
        allowed_providers:
          type: array
          items:
            type: string
          description: Allowlist of providers this agent may use (empty = all allowed)
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key-value metadata

    AgentRegistrationResponse:
      type: object
      properties:
        agent_id:
          type: string
          description: Unique identifier assigned to the agent
          example: agt-a1b2c3d4-e5f6-7890-abcd-ef1234567890
        tenant_id:
          type: string
        name:
          type: string
        agent_secret:
          type: string
          description: |
            Shared secret for API key authentication.
            SHOWN ONCE — store securely, cannot be retrieved again.
          format: password
        trust_level:
          type: string
          enum: [restricted, standard, privileged]
        capabilities:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, suspended, revoked]
        created_at:
          type: string
          format: date-time

    AgentResponse:
      type: object
      properties:
        agent_id:
          type: string
          example: agt-a1b2c3d4-e5f6-7890-abcd-ef1234567890
        tenant_id:
          type: string
        name:
          type: string
        description:
          type: string
        trust_level:
          type: string
          enum: [restricted, standard, privileged]
        capabilities:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, suspended, revoked]
        max_requests_per_minute:
          type: integer
        allowed_models:
          type: array
          items:
            type: string
        allowed_providers:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
          nullable: true

    AgentUpdateRequest:
      type: object
      description: Partial update — only provided fields are changed
      properties:
        name:
          type: string
          maxLength: 128
        description:
          type: string
          maxLength: 1024
        trust_level:
          type: string
          enum: [restricted, standard, privileged]
        capabilities:
          type: array
          items:
            type: string
        max_requests_per_minute:
          type: integer
          minimum: 1
          maximum: 10000
        allowed_models:
          type: array
          items:
            type: string
        allowed_providers:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, suspended]
        metadata:
          type: object
          additionalProperties: true

    # ---- Tokens --------------------------------------------------------------

    TokenIssueRequest:
      type: object
      required: [tenant_id]
      properties:
        tenant_id:
          type: string
          description: Tenant context for this token
        scopes:
          type: array
          items:
            type: string
          default: [ai:inference]
          description: |
            OAuth2-style scopes to embed in the token.
            Valid scopes include:
            - `ai:inference` — call LLM completion endpoints
            - `ai:embed`     — call embedding endpoints
            - `ai:image`     — call image generation endpoints
            - `ai:audit`     — emit audit events
            - `ai:admin`     — privileged admin operations
          example: [ai:inference, ai:audit]
        expires_in:
          type: integer
          default: 3600
          minimum: 60
          maximum: 86400
          description: Token lifetime in seconds (max 24h)
        agent_claims:
          type: object
          additionalProperties:
            type: string
          description: Additional key-value claims to embed in the JWT payload

    TokenResponse:
      type: object
      properties:
        token:
          type: string
          description: Signed JWT access token (legacy field)
        access_token:
          type: string
          description: Signed JWT (ML-DSA-87 / Dilithium)
        agent_id:
          type: string
          description: Agent identifier the token belongs to
        expires_at:
          type: string
          format: date-time
          description: Absolute expiry time (UTC)
        ttl_seconds:
          type: integer
          description: Token validity in seconds
        expires_in:
          type: integer
          description: Compatibility alias for token lifetime in seconds
        scopes:
          type: array
          items: 
            type: string
        token_id:
          type: string
          description: Unique token JTI (can be used to revoke this specific token)

    TokenValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        reason:
          type: string
          nullable: true
        claims:
          type: object
          additionalProperties: true

    # ---- Workload attestation ------------------------------------------------

    WorkloadAttestationRequest:
      type: object
      required: [agent_id]
      properties:
        agent_id:
          type: string
        namespace:
          type: string
          description: Workload namespace (defaults to `default`)
        service_account:
          type: string
          description: Service account (defaults to `default`)

    WorkloadAttestationResponse:
      type: object
      properties:
        workload_id:
          type: string
        agent_id:
          type: string
        svid:
          type: string
          description: SPIFFE URI for the attested workload
        namespace:
          type: string
        service_account:
          type: string
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    # ---- Delegations ---------------------------------------------------------

    DelegationCreateRequest:
      type: object
      required: [parent_human_id, agent_id]
      properties:
        parent_human_id:
          type: string
          description: Parent human identifier
        agent_id:
          type: string
          description: Agent receiving delegation
          example: agt-worker-002
        scope:
          type: array
          items:
            type: string
          description: Delegated scope
          default: ['*']
        expires_at:
          type: string
          format: date-time
          nullable: true

    DelegationResponse:
      type: object
      properties:
        chain_id:
          type: string
          description: Unique delegation chain identifier
          example: del-chain-abc123
        parent_human_id:
          type: string
        agent_id:
          type: string
        scope:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        created_at:
          type: string
          format: date-time

    # ---- AI Router -----------------------------------------------------------

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string
          description: Message text content
        name:
          type: string
          description: Optional name for multi-agent scenarios
        tool_call_id:
          type: string
          description: Tool call ID (for role=tool messages)

    ChatCompletionRequest:
      type: object
      required: [messages]
      properties:
        tenant_id:
          type: string
          description: Tenant context (required for multi-tenant deployments)
        provider:
          type: string
          enum: [auto, openai, anthropic, google, amazon, microsoft, xai, meta, perplexity]
          description: Target provider. Use `auto` for cost-optimised routing.
        model:
          type: string
          description: Model identifier (e.g. "gpt-4o", "claude-3-5-sonnet-20241022")
          example: gpt-4o
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          minItems: 1
        max_tokens:
          type: integer
          minimum: 1
          maximum: 128000
          default: 1024
        temperature:
          type: number
          format: float
          minimum: 0.0
          maximum: 2.0
          default: 1.0
        stream:
          type: boolean
          default: false
          description: Enable SSE streaming of completion tokens
        system:
          type: string
          description: System prompt (alternative to messages[0].role=system)
        agent_id:
          type: string
          nullable: true
          description: Optional agent identifier for audit context
        trace_id:
          type: string
          nullable: true
          description: Optional trace ID for correlation
        tools:
          type: array
          items:
            type: object
          nullable: true

    ChatChoice:
      type: object
      properties:
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatMessage'
        finish_reason:
          type: string
          enum: [stop, length, content_filter, tool_calls]
        logprobs:
          nullable: true
          type: object

    UsageStats:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer

    CompletionRequest:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
          description: Model identifier (e.g. gpt-4o-mini)
        prompt:
          type: string
          description: Text prompt for completion
        provider:
          type: string
          description: Optional explicit provider override
        max_tokens:
          type: integer
          minimum: 1
        temperature:
          type: number
          format: float
          minimum: 0
          maximum: 2
        tenant_id:
          type: string
          description: Tenant context
        agent_id:
          type: string
          nullable: true
        trace_id:
          type: string
          nullable: true

    CompletionResponse:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        model:
          type: string
        choices:
          type: array
          items:
            type: object
        usage:
          $ref: '#/components/schemas/UsageStats'
        cost_usd:
          type: number
          format: float
        latency_ms:
          type: integer
        trace_id:
          type: string
          nullable: true

    EmbeddingsRequest:
      type: object
      required: [model, input]
      properties:
        model:
          type: string
        input:
          type: string
          description: Input text to embed
        provider:
          type: string
        tenant_id:
          type: string
        agent_id:
          type: string
        trace_id:
          type: string

    EmbeddingsResponse:
      type: object
      properties:
        provider:
          type: string
        object:
          type: string
        model:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              object:
                type: string
              index:
                type: integer
              embedding:
                type: array
                items:
                  type: number
        usage:
          $ref: '#/components/schemas/UsageStats'

    ImagesGenerateRequest:
      type: object
      required: [model, prompt]
      properties:
        model:
          type: string
        prompt:
          type: string
        size:
          type: string
          default: 1024x1024
        n:
          type: integer
          default: 1
        provider:
          type: string
        tenant_id:
          type: string
        agent_id:
          type: string
        trace_id:
          type: string

    ImagesGenerateResponse:
      type: object
      properties:
        provider:
          type: string
        created:
          type: integer
          format: int64
        data:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              b64_json:
                type: string
              revised_prompt:
                type: string
              content:
                type: string

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique completion ID
        model:
          type: string
          description: Model that produced the response
        provider:
          type: string
          description: Provider that served the request
        choices:
          type: array
          items:
            $ref: '#/components/schemas/ChatChoice'
        usage:
          $ref: '#/components/schemas/UsageStats'
        cost_usd:
          type: number
          format: float
          description: Estimated cost in USD for this completion
        latency_ms:
          type: integer
          description: Total round-trip latency in milliseconds
        trace_id:
          type: string
          nullable: true

    PolicyDecision:
      type: object
      properties:
        decision_type:
          type: string
          enum:
            - ALLOW
            - DENY
            - ALLOW_WITH_REDACTION
            - ALLOW_WITH_LIMITS
            - REQUIRE_APPROVAL
            - ALLOW_WITH_AUDIT_ONLY
            - QUARANTINE
          description: Policy decision type
        allowed:
          type: boolean
        reason:
          type: string
          description: Human-readable reason for the decision
        redaction_targets:
          type: array
          items:
            type: string
          description: Redaction targets applied when decision is ALLOW_WITH_REDACTION
        limits:
          type: object
          additionalProperties: true
          description: Limits applied when decision is ALLOW_WITH_LIMITS
        redacted_prompt:
          type: string
          description: Prompt after PII / secret redaction (empty if no redaction occurred)
        risk_score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Risk score computed by the policy engine
        latency_ms:
          type: integer
          description: Policy evaluation latency
        policy_id:
          type: string
          description: ID of the matched policy rule

    PolicyProxyMode:
      type: object
      properties:
        tenant_id:
          type: string
        mode:
          type: string
        source:
          type: string

    PolicyOut:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        tenant_id:
          type: string
        version:
          type: string
        enabled:
          type: boolean
        action:
          type: string
        priority:
          type: integer
        conditions:
          type: object
          additionalProperties: true
          nullable: true
        rules:
          type: object
          additionalProperties: true
        compliance_frameworks:
          type: array
          items:
            type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          nullable: true

    PolicyCreate:
      type: object
      required: [name, tenant_id]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        tenant_id:
          type: string
        enabled:
          type: boolean
          default: true
        action:
          type: string
          default: monitor
        priority:
          type: integer
          default: 100
        conditions:
          type: object
          additionalProperties: true
          nullable: true
        rules:
          type: object
          additionalProperties: true
          description: Policy rule expression (required in create/update payloads)
        compliance_frameworks:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    PolicyUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        enabled:
          type: boolean
        action:
          type: string
        priority:
          type: integer
        conditions:
          type: object
          additionalProperties: true
        rules:
          type: object
          additionalProperties: true
        compliance_frameworks:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    PolicyToggle:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    PolicyBulkToggle:
      type: object
      required: [policy_ids, enabled]
      properties:
        policy_ids:
          type: array
          items:
            type: string
        enabled:
          type: boolean

    PolicyExportItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        action:
          type: string
        priority:
          type: integer
        conditions:
          type: object
          additionalProperties: true
        rules:
          type: object
          additionalProperties: true
        compliance_frameworks:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        version:
          type: string

    PolicyLegacyEvaluationResponse:
      type: object
      properties:
        action:
          type: string
          enum: [allow, block, warn]
        reason:
          type: string
        policy_id:
          type: string
          nullable: true
        policy_name:
          type: string
          nullable: true
        matched_rules:
          type: array
          items:
            type: string
        compliance_frameworks:
          type: array
          items:
            type: string
        decision:
          type: string
        req_id:
          type: string
        risk_score:
          type: number
          format: float

    PolicyEvaluateRequest:
      type: object
      required: [tenant_id, context]
      properties:
        tenant_id:
          type: string
          description: Tenant identifier
        context:
          type: object
          additionalProperties: true
          description: Policy evaluation context payload

    PolicyEvaluationResponse:
      type: object
      required: [req_id, decision]
      properties:
        simulation:
          type: boolean
          description: Present and true for `/policies/simulate` responses
        req_id:
          type: string
        decision:
          type: string
          enum:
            - ALLOW
            - DENY
            - ALLOW_WITH_REDACTION
            - ALLOW_WITH_LIMITS
            - REQUIRE_APPROVAL
            - ALLOW_WITH_AUDIT_ONLY
            - QUARANTINE
        reason:
          type: string
        policy_id:
          type: string
          nullable: true
        policy_name:
          type: string
          nullable: true
        modifiers:
          type: object
          additionalProperties: true
          nullable: true
        risk_score:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
        latency_ms:
          type: number
          format: float

    PolicyBatchEvaluateRequest:
      type: object
      required: [tenant_id, requests]
      properties:
        tenant_id:
          type: string
        requests:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: true

    PolicyBatchEvaluateResponse:
      type: object
      properties:
        tenant_id:
          type: string
        count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/PolicyEvaluationResponse'

    PolicyImportRequest:
      type: object
      required: [tenant_id, policy_name, source]
      properties:
        tenant_id:
          type: string
        policy_name:
          type: string
        source:
          type: string
          description: Policy source text in Rego or Cedar
        format:
          type: string
          enum: [rego, cedar]
        enabled:
          type: boolean
          default: true
        priority:
          type: integer
          default: 100

    PolicyImportResponse:
      type: object
      properties:
        status:
          type: string
        format:
          type: string
        policy_id:
          type: string
        policy_name:
          type: string

    PolicyExplanationResponse:
      type: object
      properties:
        req_id:
          type: string
        tenant_id:
          type: string
        decision:
          $ref: '#/components/schemas/PolicyEvaluationResponse'
        matched_policy:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
        evaluated_at:
          type: string
          format: date-time

    PolicyDeniedResponse:
      type: object
      properties:
        error:
          type: string
          enum: [policy_denied]
        message:
          type: string
        decision:
          $ref: '#/components/schemas/PolicyDecision'
        status:
          type: integer
          enum: [403]

    ModelInfo:
      type: object
      properties:
        id:
          type: string
          example: gpt-4o
        provider:
          type: string
          example: openai
        display_name:
          type: string
        object:
          type: string
          example: model
        capabilities:
          type: array
          items:
            type: string
            enum: [chat, embed, image, audio, vision, code, function_calling]
        max_tokens:
          type: integer
          nullable: true
        input_cost_per_1k:
          type: number
          format: float
          nullable: true
        output_cost_per_1k:
          type: number
          format: float
          nullable: true
        available:
          type: boolean
          default: true

    ProviderInfo:
      type: object
      properties:
        provider_id:
          type: string
        display_name:
          type: string
        status:
          type: string
          enum: [configured, unconfigured]
        latency_ms:
          type: integer
        models:
          type: array
          items:
            type: string
