<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
body{font-family:system-ui;background:#0f172a;color:#e2e8f0;max-width:600px;margin:40px auto;padding:20px;}
h1{font-size:20px;} label{display:block;font-size:13px;color:#94a3b8;margin:12px 0 4px;}
input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;box-sizing:border-box;}
button{margin-top:16px;padding:8px 20px;border-radius:8px;border:none;background:#4f46e5;color:#fff;cursor:pointer;}
button:hover{background:#4338ca;} .msg{margin-top:8px;font-size:13px;color:#22c55e;}
</style></head><body>
<h1>CyberArmor Protect — Settings</h1>
<label>Control Plane URL</label><input id="url" placeholder="http://localhost:8000">
<label>API Key / PQC Credential</label><input id="key" type="password" placeholder="x-api-key or PQC:...">
<label>Tenant ID</label><input id="tenant" placeholder="default">
<button id="save">Save</button><div class="msg" id="msg"></div>
<script src="pqc_auth.js"></script><script src="options.js"></script>
</body></html>
