<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
body{width:320px;font-family:system-ui;background:#0f172a;color:#e2e8f0;margin:0;padding:16px;}
h2{font-size:16px;margin:0 0 12px;}
.status{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;background:#1e293b;margin-bottom:8px;}
.dot{width:8px;height:8px;border-radius:50%;}
.dot.green{background:#22c55e;} .dot.red{background:#ef4444;}
.stat{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#94a3b8;}
.stat b{color:#e2e8f0;}
a{color:#818cf8;text-decoration:none;font-size:12px;}
</style></head><body>
<h2>CyberArmor Protect</h2>
<div class="status"><div class="dot green" id="statusDot"></div><span id="statusText">Active</span></div>
<div class="stat"><span>Policies loaded</span><b id="policyCount">0</b></div>
<div class="stat"><span>Auth mode</span><b id="authMode">Unknown</b></div>
<div class="stat"><span>AI requests monitored</span><b id="aiCount">0</b></div>
<div class="stat"><span>Threats blocked</span><b id="blockCount">0</b></div>
<br><a href="#" id="optionsLink">Settings</a>
<script src="popup.js"></script>
</body></html>
