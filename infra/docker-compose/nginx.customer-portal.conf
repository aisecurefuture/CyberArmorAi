server {
    listen 80;
    server_name _;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location = /_customer_auth_check {
        internal;
        set $upstream_control_plane http://control-plane:8000;
        proxy_pass $upstream_control_plane/customer-auth/session;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }

    location /auth/ {
        set $upstream_control_plane http://control-plane:8000;
        rewrite ^/auth/(.*)$ /customer-auth/$1 break;
        proxy_pass $upstream_control_plane;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
    }

    location = /login.html {
        try_files /login.html =404;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location = /auth-unavailable.html {
        internal;
        try_files /auth-unavailable.html =503;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location = /CyberArmorAILogo.png {
        try_files /CyberArmorAILogo.png =404;
        add_header X-Content-Type-Options nosniff always;
    }

    location /api/customer/ {
        auth_request /_customer_auth_check;
        auth_request_set $customer_email $upstream_http_x_customer_email;
        auth_request_set $customer_tenant_id $upstream_http_x_customer_tenant_id;
        auth_request_set $customer_role $upstream_http_x_customer_role;
        error_page 401 = @customer_unauthorized_api;
        error_page 500 502 503 504 = @customer_auth_unavailable_api;
        set $upstream_control_plane http://control-plane:8000;
        rewrite ^/api/customer/(.*)$ /customer/$1 break;
        proxy_pass $upstream_control_plane;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Customer-Email $customer_email;
        proxy_set_header X-Customer-Tenant-ID $customer_tenant_id;
        proxy_set_header X-Customer-Role $customer_role;
    }

    location / {
        auth_request /_customer_auth_check;
        error_page 401 = @customer_login;
        error_page 500 502 503 504 =503 /auth-unavailable.html;
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location @customer_login {
        return 302 /login.html;
    }

    location @customer_unauthorized_api {
        default_type application/json;
        return 401 '{"detail":"Customer portal authentication required"}';
    }

    location @customer_auth_unavailable_api {
        default_type application/json;
        return 503 '{"detail":"Customer portal authentication service unavailable"}';
    }
}
