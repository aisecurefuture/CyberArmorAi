server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so upstream names are resolved at
    # request time (not at startup).  This prevents nginx from crashing when
    # a backend container (e.g. detection, which waits for ollama) hasn't
    # started yet when the dashboard container comes up.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Static dashboard files
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
    }

    # API reverse proxy - Control Plane
    location /api/control-plane/ {
        set $upstream_cp http://control-plane:8000;
        proxy_pass $upstream_cp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API reverse proxy - Policy Service
    location /api/policy/ {
        set $upstream_policy http://policy:8001;
        proxy_pass $upstream_policy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Detection Service
    location /api/detection/ {
        set $upstream_detection http://detection:8002;
        proxy_pass $upstream_detection/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Response Service
    location /api/response/ {
        set $upstream_response http://response:8003;
        proxy_pass $upstream_response/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Identity Service
    location /api/identity/ {
        set $upstream_identity http://identity:8004;
        proxy_pass $upstream_identity/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - SIEM Connector
    location /api/siem/ {
        set $upstream_siem http://siem-connector:8005;
        proxy_pass $upstream_siem/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Compliance Service
    location /api/compliance/ {
        set $upstream_compliance http://compliance:8006;
        proxy_pass $upstream_compliance/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Proxy Agent
    location /api/proxy-agent/ {
        set $upstream_proxy_agent http://proxy-agent:8010;
        proxy_pass $upstream_proxy_agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
