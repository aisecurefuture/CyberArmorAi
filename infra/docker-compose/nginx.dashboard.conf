server {
    listen 80;
    server_name _;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so upstream names are resolved at
    # request time (not at startup).  This prevents nginx from crashing when
    # a backend container (e.g. detection, which waits for ollama) hasn't
    # started yet when the dashboard container comes up.
    resolver 127.0.0.11 valid=30s ipv6=off;

    location = /_dashboard_auth_check {
        internal;
        set $upstream_dashboard_auth http://dashboard-auth:8088;
        proxy_pass $upstream_dashboard_auth/session;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
    }

    location /auth/ {
        set $upstream_dashboard_auth http://dashboard-auth:8088;
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass $upstream_dashboard_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
    }

    location = /login.html {
        try_files /login.html =404;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location = /auth-unavailable.html {
        internal;
        try_files /auth-unavailable.html =503;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location = /CyberArmorAILogo.png {
        try_files /CyberArmorAILogo.png =404;
        add_header X-Content-Type-Options nosniff always;
    }

    location /shared/ {
        alias /opt/cyberarmor/shared/;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "public, max-age=300" always;
    }

    # Static dashboard files
    location / {
        auth_request /_dashboard_auth_check;
        error_page 401 = @dashboard_login;
        error_page 500 502 503 504 =503 /auth-unavailable.html;
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location @dashboard_login {
        return 302 /login.html;
    }

    # API reverse proxy - Control Plane
    location /api/control-plane/ {
        auth_request /_dashboard_auth_check;
        error_page 401 = @unauthorized_api;
        error_page 500 502 503 504 = @auth_unavailable_api;
        set $upstream_cp http://control-plane:8000;
        proxy_pass $upstream_cp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API reverse proxy - Policy Service
    location /api/policy/ {
        auth_request /_dashboard_auth_check;
        error_page 401 = @unauthorized_api;
        error_page 500 502 503 504 = @auth_unavailable_api;
        set $upstream_policy http://policy:8001;
        proxy_pass $upstream_policy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Detection Service
    location /api/detection/ {
        auth_request /_dashboard_auth_check;
        error_page 401 = @unauthorized_api;
        error_page 500 502 503 504 = @auth_unavailable_api;
        set $upstream_detection http://detection:8002;
        proxy_pass $upstream_detection/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Response Service
    location /api/response/ {
        auth_request /_dashboard_auth_check;
        error_page 401 = @unauthorized_api;
        error_page 500 502 503 504 = @auth_unavailable_api;
        set $upstream_response http://response:8003;
        proxy_pass $upstream_response/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Identity Service
    location /api/identity/ {
        auth_request /_dashboard_auth_check;
        error_page 401 = @unauthorized_api;
        error_page 500 502 503 504 = @auth_unavailable_api;
        set $upstream_identity http://identity:8004;
        proxy_pass $upstream_identity/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - SIEM Connector
    location /api/siem/ {
        auth_request /_dashboard_auth_check;
        error_page 401 = @unauthorized_api;
        error_page 500 502 503 504 = @auth_unavailable_api;
        set $upstream_siem http://siem-connector:8005;
        proxy_pass $upstream_siem/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Compliance Service
    location /api/compliance/ {
        auth_request /_dashboard_auth_check;
        error_page 401 = @unauthorized_api;
        error_page 500 502 503 504 = @auth_unavailable_api;
        set $upstream_compliance http://compliance:8006;
        proxy_pass $upstream_compliance/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API reverse proxy - Proxy Agent
    location /api/proxy-agent/ {
        auth_request /_dashboard_auth_check;
        error_page 401 = @unauthorized_api;
        error_page 500 502 503 504 = @auth_unavailable_api;
        set $upstream_proxy_agent http://proxy-agent:8010;
        proxy_pass $upstream_proxy_agent/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location @unauthorized_api {
        default_type application/json;
        return 401 '{"detail":"Dashboard authentication required"}';
    }

    location @auth_unavailable_api {
        default_type application/json;
        return 503 '{"detail":"Dashboard authentication service unavailable"}';
    }
}
