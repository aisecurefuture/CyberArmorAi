services:
  # --- Policy Engine (OPA) ---
  # Open Policy Agent: evaluates Rego policies pushed by the policy service.
  # API: http://opa:8181/v1/  (internal only; not exposed to host by default)
  opa:
    image: openpolicyagent/opa:latest-static
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--log-format=json"
    ports: ["${OPA_HOST_PORT:-8181}:8181"]
    healthcheck:
      test: ["CMD", "/opa", "eval", "--format", "raw", "data"]
      interval: 10s
      retries: 3
    restart: unless-stopped

  # --- Local LLM (Ollama) ---
  # Serves open-source quantised models locally.
  # Pull models with:  docker compose exec ollama ollama pull llama3.2:3b
  # Recommended models (fast → accurate):
  #   phi3:mini  |  llama3.2:3b  |  mistral:7b  |  llama3.1:8b
  #
  # GPU note: add the following to this service for NVIDIA GPU acceleration:
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      # Mount the Mac host's ~/.ollama so models pulled natively are available
      # to the container without re-downloading.  Pull from the host with:
      #   brew install ollama   (if not already installed)
      #   ollama pull llama3.2:3b
      - ${HOME}/.ollama:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      retries: 5
    restart: unless-stopped

  # --- Data Stores ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: cyberarmor
      POSTGRES_USER: cyberarmor
      POSTGRES_DB: cyberarmor
    ports: ["${POSTGRES_HOST_PORT:-5432}:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberarmor"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["${REDIS_HOST_PORT:-6379}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  openbao:
    image: openbao/openbao-ubi:latest
    command: ["server", "-dev", "-dev-root-token-id=${OPENBAO_DEV_ROOT_TOKEN}"]
    environment:
      BAO_ADDR: http://127.0.0.1:8200
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["${OPENBAO_HOST_PORT:-8200}:8200"]
    volumes:
      - openbao_data:/openbao/data
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "BAO_ADDR=http://127.0.0.1:8200 bao status >/dev/null 2>&1 || exit 1"]
      interval: 10s
      retries: 5

  # --- Core Services ---
  control-plane:
    build:
      context: ../../
      dockerfile: services/control-plane/Dockerfile
    env_file: [.env]
    volumes:
      - certs:/etc/cyberarmor/tls:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      retries: 3

  policy:
    build:
      context: ../../
      dockerfile: services/policy/Dockerfile
    env_file: [.env]
    environment:
      OPA_URL: http://opa:8181
      OPA_ENABLED: "true"
      OPA_TIMEOUT_SECONDS: "5"
    volumes:
      - certs:/etc/cyberarmor/tls:ro
    depends_on:
      postgres: { condition: service_healthy }
      opa: { condition: service_healthy }
    ports: ["${POLICY_HOST_PORT:-8001}:8001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      retries: 3

  detection:
    build:
      context: ../../
      dockerfile: services/detection/Dockerfile
    environment:
      # ML model names (HuggingFace Hub IDs or local paths)
      ML_PROMPT_INJECTION_MODEL: "protectai/deberta-v3-base-prompt-injection-v2"
      ML_NER_PII_MODEL: "dslim/bert-base-NER"
      ML_TOXICITY_MODEL: "unitary/toxic-bert"
      ML_ZERO_SHOT_MODEL: "facebook/bart-large-mnli"
      # Local LLM via Ollama sidecar
      # Set OLLAMA_ENABLED=true once you have pulled the model on a network
      # that allows access to registry.ollama.ai, then restart the stack.
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: "llama3.2:3b"
      OLLAMA_ENABLED: "true"
      OLLAMA_TIMEOUT_SECONDS: "10"
      # Cache models in a persistent volume
      TRANSFORMERS_CACHE: /models
      HF_HOME: /models
      # Set to 1 after initial model download to block outbound HF traffic
      TRANSFORMERS_OFFLINE: "0"
    volumes:
      - hf_models:/models
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8002:8002"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      retries: 3

  response:
    build:
      context: ../../
      dockerfile: services/response/Dockerfile
    env_file: [.env]
    depends_on: [proxy-agent]
    ports: ["8003:8003"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      retries: 3

  identity:
    build:
      context: ../../
      dockerfile: services/identity/Dockerfile
    env_file: [.env]
    ports: ["8004:8004"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      retries: 3

  siem-connector:
    build:
      context: ../../
      dockerfile: services/siem-connector/Dockerfile
    env_file: [.env]
    ports: ["8005:8005"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health')"]
      interval: 10s
      retries: 3

  compliance:
    build:
      context: ../../
      dockerfile: services/compliance/Dockerfile
    env_file: [.env]
    ports: ["8006:8006"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 10s
      retries: 3

  # --- AISR Runtime (single decision endpoint) ---
  runtime:
    build:
      context: ../../
      dockerfile: services/runtime/Dockerfile
    env_file: [.env]
    volumes:
      - certs:/etc/cyberarmor/tls:ro
    depends_on:
      control-plane: { condition: service_healthy }
      policy: { condition: service_healthy }
      detection: { condition: service_healthy }
      response: { condition: service_healthy }
      compliance: { condition: service_healthy }
    ports: ["8007:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      retries: 3

  # --- Agents ---
  proxy-agent:
    build:
      context: ../../
      dockerfile: agents/proxy-agent/Dockerfile
    env_file: [.env]
    volumes:
      - certs:/etc/cyberarmor/tls:ro
    depends_on:
      policy: { condition: service_healthy }
    ports: ["8010:8010"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      retries: 3

  # --- Transparent Proxy ---
  transparent-proxy:
    build:
      context: ../../
      dockerfile: services/proxy/Dockerfile
    command: ["mitmdump", "--mode", "regular", "--set", "block_global=false", "--set", "connection_strategy=lazy", "--set", "ssl_insecure=true", "--set", "ignore_hosts=(^|\\.)apple\\.com(:\\d+)?$|(^|\\.)icloud\\.com(:\\d+)?$|(^|\\.)mzstatic\\.com(:\\d+)?$|(^|\\.)zoom\\.us(:\\d+)?$", "-s", "transparent_proxy.py", "--listen-port", "8080"]
    env_file: [.env]
    depends_on: [runtime, detection, policy]
    ports:
      - "8080:8080"   # HTTP proxy
      - "8443:8443"   # HTTPS proxy
      - "8081:8081"   # Management API
    volumes:
      - certs:/etc/cyberarmor/certs
      - certs:/etc/cyberarmor/tls:ro
      - mitmproxy_ca:/root/.mitmproxy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8080), timeout=2).close()"]
      interval: 10s
      retries: 3


  # --- Demo Target (mock LLM endpoint) ---
  llm-mock:
    build:
      context: ../../
      dockerfile: services/llm-mock/Dockerfile
    ports: ["9000:9000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s
      retries: 3

  # --- Demo Client (run via: docker compose --profile demo run --rm demo-client) ---
  demo-client:
    build:
      context: ../../
      dockerfile: clients/demo-client/Dockerfile
    environment:
      DEMO_PROXY_URL: http://transparent-proxy:8080
      DEMO_TARGET_URL: http://llm-mock:9000/v1/chat/completions
      TENANT_ID: default
    depends_on:
      transparent-proxy: { condition: service_healthy }
      llm-mock: { condition: service_healthy }
    profiles: ["demo"]


  # --- Demo Web Page (sales-friendly: open in browser) ---
  demo-web:
    build:
      context: ../../
      dockerfile: clients/demo-web/Dockerfile
    environment:
      DEMO_PROXY_URL: http://transparent-proxy:8080
      DEMO_TARGET_URL: http://llm-mock:9000/v1/chat/completions
      TENANT_ID: default
    depends_on:
      transparent-proxy: { condition: service_healthy }
      llm-mock: { condition: service_healthy }
    ports: ["8020:8020"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8020/health\")"]
      interval: 10s
      retries: 3

  # --- AI Identity Control Plane Services ---
  agent-identity:
    build:
      context: ../../
      dockerfile: services/agent-identity/Dockerfile
    env_file: [.env]
    volumes:
      - certs:/etc/cyberarmor/tls:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports: ["${AGENT_IDENTITY_HOST_PORT:-8008}:8008"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8008/health')"]
      interval: 10s
      retries: 3

  ai-router:
    build:
      context: ../../
      dockerfile: services/ai-router/Dockerfile
    env_file: [.env]
    volumes:
      - certs:/etc/cyberarmor/tls:ro
    depends_on:
      agent-identity: { condition: service_healthy }
      policy:         { condition: service_healthy }
      secrets-service: { condition: service_healthy }
    ports: ["${AI_ROUTER_HOST_PORT:-8009}:8009"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8009/health')"]
      interval: 10s
      retries: 3

  audit:
    build:
      context: ../../
      dockerfile: services/audit/Dockerfile
    env_file: [.env]
    volumes:
      - certs:/etc/cyberarmor/tls:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports: ["${AUDIT_HOST_PORT:-8011}:8011"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health')"]
      interval: 10s
      retries: 3

  integration-control:
    build:
      context: ../../
      dockerfile: services/integration-control/Dockerfile
    env_file: [.env]
    ports: ["8012:8012"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/health')"]
      interval: 10s
      retries: 3

  secrets-service:
    build:
      context: ../../
      dockerfile: services/secrets-service/Dockerfile
    env_file: [.env]
    environment:
      OPENBAO_TOKEN: ${OPENBAO_DEV_ROOT_TOKEN}
    volumes:
      - certs:/etc/cyberarmor/tls:ro
    depends_on:
      openbao: { condition: service_healthy }
    ports: ["${SECRETS_SERVICE_HOST_PORT:-8013}:8013"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8013/health')"]
      interval: 10s
      retries: 3

  # --- Dashboard ---
  dashboard:
    image: nginx:alpine
    depends_on: [control-plane, policy, proxy-agent, identity, siem-connector, compliance, agent-identity, ai-router, audit, secrets-service]
    ports: ["3000:80"]
    volumes:
      - ../../admin-dashboard:/usr/share/nginx/html:ro
      - ./nginx.dashboard.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  certs:
  mitmproxy_ca:
  # HuggingFace model cache – persisted so models aren't re-downloaded on restart
  hf_models:
  openbao_data:
