title = "CyberArmor gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Allow demo placeholders and obviously fake example keys"
regexes = [
  '''change-me([a-z0-9-]+)?''',
  '''replace-with-[a-z0-9-]+''',
  '''replace-with-[0-9]+-[a-z0-9-]+''',
  '''sk-mock''',
  '''abcd1234efgh5678ijkl''',
  '''PQC:'''
]

[[allowlists]]
description = "Allow generated dependency and build output directories"
paths = [
  '''^extensions/.*/node_modules/''',
  '''^dist/''',
  '''^reports/security/'''
]
