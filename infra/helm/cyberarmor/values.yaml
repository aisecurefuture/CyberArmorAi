    tag: ""
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  env: {}
  service:
    type: ClusterIP
    port: 8010
  healthCheck:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
  hpa:
    enabled: true
