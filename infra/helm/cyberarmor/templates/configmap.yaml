apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cyberarmor.fullname" . }}-config
  namespace: {{ include "cyberarmor.namespace" . }}
  labels:
    {{- include "cyberarmor.labels" . | nindent 4 }}
data:
  # Service discovery URLs
  CONTROL_PLANE_URL: "http://{{ include "cyberarmor.fullname" . }}-control-plane:{{ .Values.controlPlane.service.port }}"
  POLICY_URL: "http://{{ include "cyberarmor.fullname" . }}-policy:{{ .Values.policy.service.port }}"
  DETECTION_URL: "http://{{ include "cyberarmor.fullname" . }}-detection:{{ .Values.detection.service.port }}"
  RESPONSE_URL: "http://{{ include "cyberarmor.fullname" . }}-response:{{ .Values.response.service.port }}"
  IDENTITY_URL: "http://{{ include "cyberarmor.fullname" . }}-identity:{{ .Values.identity.service.port }}"
  SIEM_CONNECTOR_URL: "http://{{ include "cyberarmor.fullname" . }}-siem-connector:{{ .Values.siemConnector.service.port }}"
  COMPLIANCE_URL: "http://{{ include "cyberarmor.fullname" . }}-compliance:{{ .Values.compliance.service.port }}"
  PROXY_AGENT_URL: "http://{{ include "cyberarmor.fullname" . }}-proxy-agent:{{ .Values.proxyAgent.service.port }}"
  SECRETS_SERVICE_URL: "http://{{ include "cyberarmor.fullname" . }}-secrets-service:{{ .Values.secretsService.service.port }}"
  DASHBOARD_URL: "http://{{ include "cyberarmor.fullname" . }}-admin-dashboard:{{ .Values.adminDashboard.service.port }}"
  OPENBAO_ADDR: {{ .Values.openBao.addr | quote }}
  OPENBAO_NAMESPACE: {{ .Values.openBao.namespace | quote }}
  OPENBAO_KV_MOUNT: {{ .Values.openBao.kvMount | quote }}
  OPENBAO_TRANSIT_MOUNT: {{ .Values.openBao.transitMount | quote }}
  OPENBAO_TIMEOUT_SECONDS: {{ .Values.openBao.timeoutSeconds | quote }}

  # Database
  DATABASE_HOST: "{{ include "cyberarmor.fullname" . }}-postgresql"
  DATABASE_PORT: {{ .Values.postgresql.service.port | quote }}
  DATABASE_NAME: {{ .Values.postgresql.credentials.database | quote }}

  # Redis
  REDIS_HOST: "{{ include "cyberarmor.fullname" . }}-redis"
  REDIS_PORT: {{ .Values.redis.service.port | quote }}

  # Security settings
  FIPS_MODE: {{ .Values.global.fipsMode | quote }}
  PQC_ENABLED: {{ .Values.global.pqcEnabled | quote }}

  # Observability
  LOG_LEVEL: {{ .Values.global.logLevel | quote }}
  LOG_FORMAT: "json"
  ROUTER_USE_SECRETS_SERVICE: {{ .Values.aiRouter.config.useSecretsService | quote }}
  ROUTER_REQUIRE_SECRETS_SERVICE: {{ .Values.aiRouter.config.requireSecretsService | quote }}

  # Environment
  ENVIRONMENT: {{ .Values.global.environment | quote }}

  # SIEM configuration
  SIEM_OUTPUT_FORMAT: "cef"
  SIEM_BATCH_SIZE: "100"
  SIEM_FLUSH_INTERVAL: "10s"
