{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cyberarmor.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "cyberarmor.labels" . | nindent 4 }}
  {{- if or .Values.ingress.annotations .Values.ingress.mtls.enabled }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.ingress.mtls.enabled }}
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-secret: "{{ .Values.global.namespace }}/{{ .Values.ingress.mtls.caSecretName }}"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "{{ .Values.ingress.mtls.verifyDepth }}"
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "{{ .Values.ingress.mtls.passCertificateToUpstream }}"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Dashboard
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cyberarmor.fullname" . }}-dashboard
                port:
                  number: {{ .Values.adminDashboard.service.port }}
          # API routes
          - path: /api/v1/policies
            pathType: Prefix
            backend:
              service:
                name: {{ include "cyberarmor.fullname" . }}-policy
                port:
                  number: {{ .Values.policy.service.port }}
          - path: /api/v1/detect
            pathType: Prefix
            backend:
              service:
                name: {{ include "cyberarmor.fullname" . }}-detection
                port:
                  number: {{ .Values.detection.service.port }}
          - path: /api/v1/incidents
            pathType: Prefix
            backend:
              service:
                name: {{ include "cyberarmor.fullname" . }}-response
                port:
                  number: {{ .Values.response.service.port }}
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "cyberarmor.fullname" . }}-identity
                port:
                  number: {{ .Values.identity.service.port }}
          - path: /api/v1/siem
            pathType: Prefix
            backend:
              service:
                name: {{ include "cyberarmor.fullname" . }}-siem-connector
                port:
                  number: {{ .Values.siemConnector.service.port }}
          - path: /api/v1/compliance
            pathType: Prefix
            backend:
              service:
                name: {{ include "cyberarmor.fullname" . }}-compliance
                port:
                  number: {{ .Values.compliance.service.port }}
          # Default to control plane
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "cyberarmor.fullname" . }}-control-plane
                port:
                  number: {{ .Values.controlPlane.service.port }}
{{- end }}
