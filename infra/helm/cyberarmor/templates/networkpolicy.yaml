{{- if .Values.networkPolicy.enabled }}
# Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cyberarmor.fullname" . }}-default-deny
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow inter-service communication within namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cyberarmor.fullname" . }}-allow-internal
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- include "cyberarmor.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "cyberarmor.selectorLabels" . | nindent 14 }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "cyberarmor.selectorLabels" . | nindent 14 }}
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow ingress from ingress controller to dashboard and API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cyberarmor.fullname" . }}-allow-ingress
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- include "cyberarmor.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8002
        - protocol: TCP
          port: 8003
        - protocol: TCP
          port: 8004
        - protocol: TCP
          port: 8005
        - protocol: TCP
          port: 8006
        - protocol: TCP
          port: 8010
---
# Allow proxy-agent egress to external AI endpoints
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cyberarmor.fullname" . }}-proxy-egress
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: proxy-agent
  policyTypes:
    - Egress
  egress:
    # Allow HTTPS to external AI APIs
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8443
    # Allow internal communication
    - to:
        - podSelector:
            matchLabels:
              {{- include "cyberarmor.selectorLabels" . | nindent 14 }}
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
{{- end }}
