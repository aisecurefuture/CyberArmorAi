{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cyberarmor.fullname" . }}-role
  namespace: {{ include "cyberarmor.namespace" . }}
  labels:
    {{- include "cyberarmor.labels" . | nindent 4 }}
rules:
  # Allow reading ConfigMaps for service configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Allow reading Secrets for credentials
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Allow reading own pod information (for leader election, etc.)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Allow creating events for audit logging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Allow coordination for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cyberarmor.fullname" . }}-rolebinding
  namespace: {{ include "cyberarmor.namespace" . }}
  labels:
    {{- include "cyberarmor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cyberarmor.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "cyberarmor.serviceAccountName" . }}
    namespace: {{ include "cyberarmor.namespace" . }}
{{- end }}
