apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cyberarmor.fullname" . }}-secrets
  namespace: {{ include "cyberarmor.namespace" . }}
  labels:
    {{- include "cyberarmor.labels" . | nindent 4 }}
type: Opaque
data:
  # Inter-service authentication API key
  # IMPORTANT: Replace with a strong, randomly generated key in production.
  # Use: openssl rand -base64 32 | base64
  INTER_SERVICE_API_KEY: {{ "changeme-generate-strong-key" | b64enc | quote }}

  # Database credentials
  DATABASE_USERNAME: {{ .Values.postgresql.credentials.username | b64enc | quote }}
  DATABASE_PASSWORD: {{ .Values.postgresql.credentials.password | b64enc | quote }}

  # Redis password
  REDIS_PASSWORD: {{ .Values.redis.password | b64enc | quote }}

  # Shared secrets service API key
  SECRETS_SERVICE_API_SECRET: {{ "changeme-secrets-service-key" | b64enc | quote }}

  # OpenBao bootstrap token or scoped service token
  OPENBAO_TOKEN: {{ "changeme-openbao-token" | b64enc | quote }}

  # PQC key material reference (path to key material in mounted volume or KMS)
  PQC_KEY_MATERIAL_REF: {{ "vault:secret/data/cyberarmor/pqc-keys" | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cyberarmor.fullname" . }}-db-credentials
  namespace: {{ include "cyberarmor.namespace" . }}
  labels:
    {{- include "cyberarmor.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER: {{ .Values.postgresql.credentials.username | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.credentials.password | b64enc | quote }}
  POSTGRES_DB: {{ .Values.postgresql.credentials.database | b64enc | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:%d/%s?sslmode=require" .Values.postgresql.credentials.username .Values.postgresql.credentials.password (include "cyberarmor.fullname" .) (.Values.postgresql.service.port | int) .Values.postgresql.credentials.database | b64enc | quote }}
