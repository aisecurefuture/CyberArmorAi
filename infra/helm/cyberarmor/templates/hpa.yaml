{{- $services := dict
  "control-plane" .Values.controlPlane
  "policy" .Values.policy
  "detection" .Values.detection
  "response" .Values.response
  "identity" .Values.identity
  "siem-connector" .Values.siemConnector
  "compliance" .Values.compliance
  "proxy-agent" .Values.proxyAgent
  "dashboard" .Values.adminDashboard
-}}
{{- range $name, $svc := $services }}
{{- if $svc.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cyberarmor.fullname" $ }}-{{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "cyberarmor.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cyberarmor.fullname" $ }}-{{ $name }}
  minReplicas: {{ $svc.hpa.minReplicas }}
  maxReplicas: {{ $svc.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $svc.hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $svc.hpa.targetMemoryUtilizationPercentage }}
{{- end }}
{{- end }}
