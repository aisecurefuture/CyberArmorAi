site_name: CyberArmor AI Docs
site_url: https://docs.cyberarmor.ai
site_description: CyberArmor AI deployment, endpoint, integration, and operations documentation for enterprise AI security teams.
site_author: CyberArmor AI

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Evaluation:
      - Demo Runbooks: demos/index.md
      - CISO Demo: demos/ciso.md
      - Security Architect Demo: demos/security-architect.md
      - AppSec Demo: demos/appsec.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Install: getting-started/install.md
  - Portals:
      - Customer Portal: customer-portal/index.md
      - Admin Portal: admin-portal/index.md
      - Evidence Export: evidence/export.md
  - Platform:
      - Architecture: platform/architecture.md
      - Services: platform/services.md
      - Endpoint Agent: platform/endpoint-agent.md
      - Redaction Action Modes: platform/redaction-action-modes.md
  - Operations:
      - Deployment: operations/deployment.md
      - Troubleshooting: operations/troubleshooting.md
  - Support:
      - Support Center: support/index.md
      - Support Intake: support/intake.md

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://cyberarmor.ai
    - icon: fontawesome/solid/shield-halved
      link: https://app.cyberarmor.ai
    - icon: fontawesome/brands/github
      link: https://github.com/cyberarmor-ai
  generator: false

copyright: Copyright &copy; CyberArmor AI
